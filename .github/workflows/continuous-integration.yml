name: Continuous Integration

on:
  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      reason:
        description: 'Build on three different OS platforms and run tests'
        required: true
        default: 'Manual run'
 
jobs:
  build-and-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtwebsockets qthttpserver'
          install-deps: true
      
      - name: Set up MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Install vcpkg
        if: matrix.os == 'windows-latest'
        uses: lukka/run-vcpkg@v11

      - name: Install Protobuf (Windows)
        if: matrix.os == 'windows-latest'
        run: vcpkg install protobuf:x64-windows
        
      - name: Install Protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - name: Install Protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
        
      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          ${{ matrix.os == 'windows-latest' && '-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake' || '' }}

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure