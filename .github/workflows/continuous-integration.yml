name: Continuous Integration

on:
  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      reason:
        description: 'Build on three different OS platforms and run tests'
        required: true
        default: 'Manual run'
 
jobs:
  build-and-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash

    env:
      BUILD_DIR: build
      QT_VERSION: 6.8.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Cache Qt
        uses: actions/cache@v4
        with:
          path: ${{ runner.os }}-QtCache
          key: ${{ runner.os }}-qt-${{ env.QT_VERSION }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtwebsockets qthttpserver'
          install-deps: true
          cache: true
      
      - name: Set up MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.bat
        
      - name: Install Protoc (Windows)
        if: matrix.os == 'windows-latest'
        run: ./vcpkg/vcpkg install protobuf:x64-windows
        env:
          VCPKG_BUILD_TYPE: release
        
      - name: Install Protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - name: Install Protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
        
      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake -S . -B build `
          -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_TESTING=ON `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" 
      
      - name: Configure CMake (Linux + MacOS)
        if: runner.os != 'windows-latest'
        run: >
          cmake -S . -B build 
          -G Ninja 
          -DCMAKE_BUILD_TYPE=Release 
          -DBUILD_TESTING=ON 

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure