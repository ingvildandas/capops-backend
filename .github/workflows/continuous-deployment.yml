name: Build and push Docker image on commit to main
 
on:
    push:
        branches: [ main ]
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
 
      - name: Build Docker Image
        run: docker build -t jacobg431/capops-api:latest .
 
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      - name: Push Docker Image
        run: docker push jacobg431/capops-api:latest
 
      - name: Deploy to Remote Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 22
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull jacobg431/capops-api:latest
            docker stop capops-api || true
            docker rm capops-api || true
            docker run -d \
                --name capops-api \
                --network capops-network \
                -e DATABASE_FILE_PATH=./capops.db \
                -e HTTP_PORT=8080 \
                -e WEBSOCKET_PORT=8081 \
                -e REDIS_HOST=redis \
                -e REDIS_PORT=6379 \
                -e PROTOBUF_CONTRACT_VERSION=1 \
                -e REST_JSON_CONTRACT_VERSION=1 \
                jacobg431/capops-api:latest